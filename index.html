<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кликер - JSON лидерборд</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; }
        .clicks { font-size: 46px; color: #ffd966; }
        button { background: #ff6b6b; font-size: 24px; padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; margin: 5px; }
        .upgrade-btn { background: #ff9800; font-size: 16px; }
        .shop-item { background: rgba(0,0,0,0.3); margin: 10px; padding: 10px; border-radius: 15px; }
        .leaderboard-list { text-align: left; max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #555; }
        input { padding: 8px; border-radius: 10px; margin: 5px; width: 150px; }
        .success { color: #4caf50; }
        .error { color: #ff6b6b; }
        .file-buttons { margin: 10px 0; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body>
<div class="container">
    <h1>КЛИКЕР</h1>
    <div class="clicks"><span id="clickCount">0</span> кликов</div>
    <div>Сила: +<span id="clickPower">1</span></div>
    <button id="clickBtn">КЛИК</button>

    <div class="shop-item">
        <h3>ЛИДЕРБОРД (JSON)</h3>
        <input type="text" id="playerName" placeholder="Твоё имя">
        <button id="saveScoreBtn" class="upgrade-btn">СОХРАНИТЬ РЕКОРД</button>
        <div class="file-buttons">
            <button id="exportBtn" class="upgrade-btn" style="background:#2196f3;">📥 ЭКСПОРТ JSON</button>
            <label for="importFile" class="upgrade-btn" style="background:#4caf50; display:inline-block; padding:8px 15px; cursor:pointer;">📤 ИМПОРТ JSON</label>
            <input type="file" id="importFile" style="display:none" accept=".json">
        </div>
        <div id="leaderboardList" class="leaderboard-list">Загрузка...</div>
    </div>

    <div class="shop-item">
        <h3>УЛУЧШЕНИЕ</h3>
        <div>Стоимость: <span id="upgradeCost">20</span></div>
        <button id="upgradeBtn" class="upgrade-btn">+1 (+10 цена)</button>
        <div>Куплено: <span id="upgradeLevel">0</span></div>
    </div>

    <div class="shop-item">
        <h3>X2 (макс 50)</h3>
        <div>Стоимость: <span id="superCost">10K</span> (+10M)</div>
        <button id="superBtn" class="upgrade-btn">КУПИТЬ X2</button>
        <div>Куплено: <span id="superCount">0</span></div>
    </div>

    <div class="shop-item">
        <h3>АВТОКЛИКЕР 20 мин</h3>
        <div>Цена: 10B</div>
        <button id="autoBtn" class="upgrade-btn">КУПИТЬ</button>
        <div id="autoStatus">Неактивен</div>
    </div>

    <div id="message"></div>
</div>

<script>
    // ФОРМАТ ЧИСЕЛ
    function formatNumber(num) {
        if (num < 1000) return Math.floor(num).toString();
        const units = ['K', 'M', 'B', 'T'];
        let i = -1, v = num;
        while (v >= 1000 && i < 3) { v /= 1000; i++; }
        return v.toFixed(1) + units[i];
    }

    let clicks = 0, normalUp = 0, superUp = 0;
    let autoInterval = null, autoEnd = 0;
    let leaderboard = []; // массив {name, score}

    // ЗАГРУЗКА ЛИДЕРБОРДА ИЗ LOCALSTORAGE
    function loadLeaderboard() {
        const data = localStorage.getItem('leaderboard_json');
        if (data) {
            try { leaderboard = JSON.parse(data); } catch(e) { leaderboard = []; }
        } else { leaderboard = []; }
        displayLeaderboard();
    }

    function displayLeaderboard() {
        const container = document.getElementById('leaderboardList');
        if (!leaderboard.length) { container.innerHTML = 'Нет рекордов'; return; }
        const sorted = [...leaderboard].sort((a,b) => b.score - a.score);
        let html = '';
        for (let i = 0; i < Math.min(sorted.length, 10); i++) {
            html += `<div class="leaderboard-item"><span>${i+1}.</span><span>${sorted[i].name}</span><span>${formatNumber(sorted[i].score)}</span></div>`;
        }
        container.innerHTML = html;
    }

    function saveLeaderboardToLocal() {
        localStorage.setItem('leaderboard_json', JSON.stringify(leaderboard));
        displayLeaderboard();
    }

    function addScore() {
        let name = document.getElementById('playerName').value.trim();
        if (!name) { showMessage("Введи имя!", "error"); return; }
        leaderboard.push({ name: name, score: Math.floor(clicks) });
        saveLeaderboardToLocal();
        showMessage(`Рекорд ${formatNumber(clicks)} сохранён!`, 'success');
    }

    // ЭКСПОРТ JSON
    function exportJSON() {
        const dataStr = JSON.stringify(leaderboard, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'leaderboard.json';
        a.click();
        URL.revokeObjectURL(url);
        showMessage('JSON экспортирован', 'success');
    }

    // ИМПОРТ JSON
    function importJSON(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    leaderboard = imported;
                    saveLeaderboardToLocal();
                    showMessage(`Импортировано ${leaderboard.length} записей`, 'success');
                } else { showMessage('Неверный формат JSON', 'error'); }
            } catch(err) { showMessage('Ошибка чтения файла', 'error'); }
        };
        reader.readAsText(file);
    }

    // ОСТАЛЬНАЯ ЛОГИКА КЛИКЕРА
    function getNormalCost() { return 20 + (normalUp * 10); }
    function getSuperCost() { return 10000 + (superUp * 10000000); }
    function getPower() { return (1 + normalUp) * Math.pow(2, superUp); }
    
    function updateUI() {
        document.getElementById('clickCount').textContent = formatNumber(clicks);
        document.getElementById('clickPower').textContent = getPower();
        document.getElementById('upgradeCost').textContent = formatNumber(getNormalCost());
        document.getElementById('upgradeLevel').textContent = normalUp;
        document.getElementById('superCost').textContent = formatNumber(getSuperCost());
        document.getElementById('superCount').textContent = superUp;
        if (autoEnd > Date.now()) {
            let s = Math.ceil((autoEnd - Date.now()) / 1000);
            document.getElementById('autoStatus').innerHTML = `Активен: ${Math.floor(s/60)} мин ${s%60} сек`;
        } else {
            if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
            document.getElementById('autoStatus').innerHTML = 'Неактивен';
        }
    }

    function showMessage(text, type) {
        let m = document.getElementById('message');
        m.innerHTML = text;
        m.className = type;
        setTimeout(() => { if (m.innerHTML === text) m.innerHTML = ''; }, 3000);
    }

    function startAuto() {
        if (autoInterval) { autoEnd += 1200 * 1000; }
        else {
            autoEnd = Date.now() + 1200 * 1000;
            autoInterval = setInterval(() => {
                if (Date.now() >= autoEnd) { clearInterval(autoInterval); autoInterval = null; updateUI(); }
                else { clicks += getPower(); updateUI(); }
            }, 1000);
        }
        updateUI();
    }

    function buyAuto() {
        if (clicks >= 10000000000) { clicks -= 10000000000; startAuto(); updateUI(); showMessage('Автокликер 20 мин!', 'success'); }
        else { showMessage('Нужно 10B', 'error'); }
    }
    function buyNormal() {
        let cost = getNormalCost();
        if (clicks >= cost) { clicks -= cost; normalUp++; updateUI(); showMessage(`+1 сила`, 'success'); }
        else { showMessage(`Нужно ${formatNumber(cost)}`, 'error'); }
    }
    function buySuper() {
        if (superUp >= 50) { showMessage("Лимит 50", "error"); return; }
        let cost = getSuperCost();
        if (clicks >= cost) { clicks -= cost; superUp++; updateUI(); showMessage(`X2 куплен`, 'success'); }
        else { showMessage(`Нужно ${formatNumber(cost)}`, 'error'); }
    }
    function handleClick() { clicks += getPower(); updateUI(); }
    function saveGame() { localStorage.setItem('clicker_save', JSON.stringify({ clicks, normalUp, superUp, autoEnd })); showMessage('Сохранено', 'success'); }
    function loadGame() {
        const saved = localStorage.getItem('clicker_save');
        if (saved) {
            try {
                const d = JSON.parse(saved);
                clicks = d.clicks || 0; normalUp = d.normalUp || 0; superUp = d.superUp || 0;
                if (d.autoEnd && d.autoEnd > Date.now()) {
                    autoEnd = d.autoEnd;
                    if (autoInterval) clearInterval(autoInterval);
                    autoInterval = setInterval(() => {
                        if (Date.now() >= autoEnd) { clearInterval(autoInterval); autoInterval = null; updateUI(); }
                        else { clicks += getPower(); updateUI(); }
                    }, 1000);
                }
                updateUI();
            } catch(e) {}
        }
    }

    document.getElementById('clickBtn').onclick = handleClick;
    document.getElementById('upgradeBtn').onclick = buyNormal;
    document.getElementById('superBtn').onclick = buySuper;
    document.getElementById('autoBtn').onclick = buyAuto;
    document.getElementById('saveScoreBtn').onclick = addScore;
    document.getElementById('exportBtn').onclick = exportJSON;
    document.getElementById('importFile').onchange = (e) => { if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value = ''; };

    loadGame();
    loadLeaderboard();
    setInterval(() => { localStorage.setItem('clicker_save', JSON.stringify({ clicks, normalUp, superUp, autoEnd })); }, 10000);
</script>
</body>
</html>
